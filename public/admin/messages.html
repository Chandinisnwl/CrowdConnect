<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Messages — Admin Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-cc-page="dashboard">
    <div id="cc-header-slot"></div>

    <main class="container animate-in admin-shell">
      <p id="gate" class="text-muted"></p>

      <div class="dash-layout" id="admin-wrap" style="display: none">
        <aside class="dash-sidebar" aria-label="Admin navigation">
          <a href="/admin/dashboard.html" class="text-muted" style="display: inline-block; margin-bottom: 10px; text-decoration: none">
            ← Back to Admin Overview
          </a>
          <div class="dash-sidebar__title font-display">Admin Panel</div>
          <nav class="dash-sidebar__nav">
            <a href="/admin/dashboard.html" class="dash-nav-item">Overview</a>
            <a href="/admin/campaigns.html" class="dash-nav-item">Campaigns</a>
            <a href="/admin/donations.html" class="dash-nav-item">Donations</a>
            <a href="/admin/users.html" class="dash-nav-item">Users</a>
            <a href="/admin/messages.html" class="dash-nav-item is-active">Messages</a>
            <a href="/faq.html" class="dash-nav-item">FAQ</a>
          </nav>
        </aside>

        <section class="dash-main">
          <div class="dash-main__head">
            <h1 class="dash-h1 font-display">Messages</h1>
          </div>

          <div class="card table-shell">
            <div class="table-head" style="grid-template-columns: 2.2fr 2.2fr 1.2fr 1.2fr">
              <div>Subject</div>
              <div>Email</div>
              <div>Status</div>
              <div class="table-actions">Action</div>
            </div>
            <div id="tbl-body" class="table-body">
              <p class="text-muted">Loading messages…</p>
            </div>
          </div>

          <div class="card" style="margin-top: 16px" id="thread" class="hidden"></div>
        </section>
      </div>
    </main>

    <div id="cc-bottom-slot"></div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }

      async function requireStaff() {
        const gate = document.getElementById("gate");
        if (!CCApi.getToken()) {
          gate.innerHTML = '<a href="/auth/login.html">Log in</a> as staff.';
          return null;
        }
        const { user } = await CCApi.request("/auth/me");
        if (user.role !== "superadmin" && user.role !== "moderator") {
          gate.textContent = "You do not have admin access.";
          return null;
        }
        document.getElementById("admin-wrap").style.display = "grid";
        gate.textContent = "";
        return user;
      }

      async function loadTickets() {
        const staff = await requireStaff();
        if (!staff) return;

        const body = document.getElementById("tbl-body");
        try {
          const { tickets } = await CCApi.request("/support/admin/tickets");
          if (!tickets.length) {
            body.innerHTML = "<p class='text-muted'>No messages yet.</p>";
            return;
          }
          body.innerHTML = tickets
            .map((t) => {
              return `
              <div class="table-row" style="grid-template-columns: 2.2fr 2.2fr 1.2fr 1.2fr" data-id="${t._id}">
                <div class="table-cell">${escapeHtml(t.subject)}</div>
                <div class="table-cell">${escapeHtml(t.email)}</div>
                <div class="table-cell"><span class="pill pill--neutral">${escapeHtml(t.status)}</span></div>
                <div class="table-cell table-actions">
                  <button type="button" class="btn btn--text" data-open="${t._id}">Open</button>
                </div>
              </div>`;
            })
            .join("");
          body.querySelectorAll("[data-open]").forEach((btn) => {
            btn.addEventListener("click", () => openThread(btn.getAttribute("data-open"), tickets));
          });
        } catch (e) {
          body.innerHTML = "<p class='text-muted'>Could not load messages.</p>";
        }
      }

      function openThread(id, tickets) {
        const t = tickets.find((x) => x._id === id);
        if (!t) return;
        const box = document.getElementById("thread");
        box.classList.remove("hidden");
        const msgs = (t.messages || [])
          .map((m) => `<div class="card mb-2" style="box-shadow:none"><strong>${escapeHtml(m.from)}</strong><p class="text-muted">${escapeHtml(m.text)}</p></div>`)
          .join("");
        box.innerHTML = `
          <h2 class="page-title" style="font-size:1.25rem">Thread: ${escapeHtml(t.subject)}</h2>
          <p class="text-muted">${escapeHtml(t.email)} · ${escapeHtml(t.status)}</p>
          ${msgs || "<p class='text-muted'>No messages.</p>"}
        `;
      }

      document.addEventListener("DOMContentLoaded", loadTickets);
    </script>
  </body>
</html>
