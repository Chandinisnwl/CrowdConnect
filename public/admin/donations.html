<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Donations — Admin Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-cc-page="dashboard">
    <div id="cc-header-slot"></div>

    <main class="container animate-in admin-shell">
      <p id="gate" class="text-muted"></p>

      <div class="dash-layout" id="admin-wrap" style="display: none">
        <aside class="dash-sidebar" aria-label="Admin navigation">
          <a href="/admin/dashboard.html" class="text-muted" style="display: inline-block; margin-bottom: 10px; text-decoration: none">
            ← Back to Overview
          </a>
          <div class="dash-sidebar__title font-display">Donations</div>
          <nav class="dash-sidebar__nav">
            <a href="/admin/dashboard.html" class="dash-nav-item">Overview</a>
            <a href="/admin/campaigns.html" class="dash-nav-item">Campaigns</a>
            <a href="/admin/donations.html" class="dash-nav-item is-active">Donations</a>
            <a href="/admin/users.html" class="dash-nav-item">Users</a>
            <a href="/admin/messages.html" class="dash-nav-item">Messages</a>
            <a href="/faq.html" class="dash-nav-item">FAQ</a>
          </nav>
        </aside>

        <section class="dash-main">
          <div class="dash-main__head">
            <h1 class="dash-h1 font-display">All Donations</h1>
          </div>

          <div class="card table-shell">
            <div class="table-head" style="grid-template-columns: 2fr 1.5fr 1fr 1fr">
              <div>Campaign</div>
              <div>Donor</div>
              <div>Amount</div>
              <div>Status</div>
            </div>
            <div id="tbl-body" class="table-body">
              <p class="text-muted">Loading donations…</p>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div id="cc-bottom-slot"></div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }
      
      function fmt(n) {
        return "₹" + Number(n || 0).toLocaleString("en-IN");
      }
      
      function badge(status) {
        const s = String(status || "").toLowerCase();
        const cls = s === "completed" ? "pill--success" : s === "failed" ? "pill--muted" : "pill--neutral";
        return '<span class="pill ' + cls + '">' + (status || "Unknown") + "</span>";
      }

      async function requireStaff() {
        const gate = document.getElementById("gate");
        if (!CCApi.getToken()) {
          gate.innerHTML = '<a href="/auth/login.html">Log in</a> as staff.';
          return null;
        }
        const { user } = await CCApi.request("/auth/me");
        if (user.role !== "superadmin" && user.role !== "moderator") {
          gate.textContent = "You do not have admin access.";
          return null;
        }
        document.getElementById("admin-wrap").style.display = "grid";
        gate.textContent = "";
        return user;
      }

      async function loadDonations() {
        const staff = await requireStaff();
        if (!staff) return;

        const body = document.getElementById("tbl-body");
        try {
          const { donations } = await CCApi.request("/admin/donations");
          if (!donations || donations.length === 0) {
            body.innerHTML = "<p class='text-muted'>No donations found.</p>";
            return;
          }
          
          body.innerHTML = donations
            .map((d) => {
              const uName = d.user ? d.user.name : "Guest";
              const cName = d.campaign ? d.campaign.title : "Deleted Campaign";
              return `
              <div class="table-row" style="grid-template-columns: 2fr 1.5fr 1fr 1fr">
                <div class="table-cell"><strong>${escapeHtml(cName)}</strong><br><small class="text-muted">TXN${escapeHtml((d.transactionId || "").slice(0,10))}</small></div>
                <div class="table-cell">${escapeHtml(uName)}</div>
                <div class="table-cell"><strong>${fmt(d.amount)}</strong></div>
                <div class="table-cell">${badge(d.status)}</div>
              </div>`;
            })
            .join("");
        } catch (e) {
          body.innerHTML = "<p class='text-muted'>Could not load donations.</p>";
        }
      }

      document.addEventListener("DOMContentLoaded", loadDonations);
    </script>
  </body>
</html>
