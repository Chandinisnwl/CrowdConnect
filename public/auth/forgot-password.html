<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Reset password — CrowdConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-cc-page="profile">
    <div id="cc-header-slot"></div>
    <main class="container animate-in" style="max-width: 420px; padding-top: 32px">
      <h1 class="page-title">Forgot password</h1>
      <p class="text-muted">We’ll email a reset link in production. For development, a token may be returned in the API response.</p>
      <form id="req" class="card" style="margin-top: 24px">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" required />
        </div>
        <button type="submit" class="btn btn--filled" style="width: 100%">Request reset</button>
      </form>
      <form id="reset" class="card" style="margin-top: 24px">
        <h2 class="page-title" style="font-size: 1.125rem">Set new password</h2>
        <div class="field">
          <label for="email2">Email</label>
          <input id="email2" type="email" required />
        </div>
        <div class="field">
          <label for="token">Reset token</label>
          <input id="token" type="text" required placeholder="From API (dev) or email" />
        </div>
        <div class="field">
          <label for="np">New password</label>
          <input id="np" type="password" minlength="6" required />
          <button type="button" class="btn btn--text" id="toggle-new-password" style="padding: 0; min-height: 32px; justify-content: flex-start">
            Show password
          </button>
        </div>
        <button type="submit" class="btn btn--outlined" style="width: 100%">Update password</button>
      </form>
      <p class="text-muted" style="margin-top: 16px"><a href="/auth/login.html">← Back to log in</a></p>
    </main>
    <div id="cc-bottom-slot"></div>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      document.getElementById("req").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const r = await CCApi.request("/auth/forgot-password", { method: "POST", body: { email: document.getElementById("email").value } });
          alert(r.message + (r.devToken ? "\n\nDev token: " + r.devToken : ""));
          if (r.devToken) {
            document.getElementById("email2").value = document.getElementById("email").value;
            document.getElementById("token").value = r.devToken;
          }
        } catch (err) {
          alert(err.message);
        }
      });
      document.getElementById("reset").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          await CCApi.request("/auth/reset-password", {
            method: "POST",
            body: {
              email: document.getElementById("email2").value,
              token: document.getElementById("token").value,
              newPassword: document.getElementById("np").value,
            },
          });
          alert("Password updated. You can log in.");
          location.href = "/auth/login.html";
        } catch (err) {
          alert(err.message);
        }
      });

      const toggleNewBtn = document.getElementById("toggle-new-password");
      const newPassInput = document.getElementById("np");
      toggleNewBtn.addEventListener("click", () => {
        const nextType = newPassInput.type === "password" ? "text" : "password";
        newPassInput.type = nextType;
        toggleNewBtn.textContent = nextType === "password" ? "Show password" : "Hide password";
      });
    </script>
  </body>
</html>
