<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Log in — CrowdConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-cc-page="profile">
    <div id="cc-header-slot"></div>
    <main class="container animate-in" style="max-width: 420px; padding-top: 32px">
      <h1 class="page-title">Welcome back</h1>
      <p class="text-muted">Log in to donate and manage your profile.</p>
      <form id="f" class="card" style="margin-top: 24px">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required />
          <button type="button" class="btn btn--text" id="toggle-password" style="padding: 0; min-height: 32px; justify-content: flex-start">
            Show password
          </button>
        </div>
        <button type="submit" class="btn btn--filled" style="width: 100%">Log in</button>
        <p class="text-muted" style="margin-top: 16px; text-align: center">
          <a href="/auth/forgot-password.html">Forgot password?</a> · <a href="/auth/signup.html">Sign up</a>
        </p>
      </form>
    </main>
    <div id="cc-bottom-slot"></div>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      document.getElementById("f").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const data = await CCApi.request("/auth/login", {
            method: "POST",
            body: {
              email: document.getElementById("email").value,
              password: document.getElementById("password").value,
            },
          });
          CCApi.setToken(data.token);
          localStorage.setItem("cc_user", JSON.stringify(data.user));
          const next = new URLSearchParams(location.search).get("next");
          location.href = next && next.startsWith("/") ? next : "/profile.html";
        } catch (err) {
          alert(err.message);
        }
      });

      const toggleBtn = document.getElementById("toggle-password");
      const passInput = document.getElementById("password");
      toggleBtn.addEventListener("click", () => {
        const nextType = passInput.type === "password" ? "text" : "password";
        passInput.type = nextType;
        toggleBtn.textContent = nextType === "password" ? "Show password" : "Hide password";
      });
    </script>
  </body>
</html>
